# 动环监控预警平台 — 全栈编排（Linux 内网单机）
# 一键启动：docker compose up -d
# 服务：db(TimescaleDB) / redis / backend(FastAPI) / frontend(nginx) / ems_mock(联调)

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dcim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcim_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dcim}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcim} -d ${POSTGRES_DB:-dcim}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      TZ: ${TZ:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-dcim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcim_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dcim}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-720}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # 同一端口承载平台 API 与 /north 推送接收端点
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

  # 联调用：模拟共济 EMS（无真实 EMS 时启用）
  ems_mock:
    build: ./ems_mock
    ports:
      - "${EMS_MOCK_PORT:-9000}:9000"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
